<!DOCTYPE html>
<html>
<head>
    <title>AI Exam Monitoring Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background: linear-gradient(135deg,#0f172a,#1e293b);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            font-family:Segoe UI;
        }
        .login-card{
            background:#1e293b;
            padding:40px;
            border-radius:20px;
            box-shadow:0 10px 30px rgba(0,0,0,0.5);
            width:350px;
            color:white;
        }
        .btn-login{
            background:#ef4444;
            border:none;
        }
        .btn-login:hover{
            background:#dc2626;
        }
    </style>
</head>

<body>

<div class="login-card text-center">

    <h3>🎓 Smart Exam AI</h3>
    <p style="font-size:14px;color:#ccc;">
        Classroom Monitoring System
    </p>

    <form onsubmit="login(event)">
    <input type="text" class="form-control mb-3" placeholder="Username" required>

    <input type="password" class="form-control mb-3" placeholder="Password" required>

    <select class="form-control mb-3">
        <option>Principal</option>
        <option>Exam Controller</option>
        <option>Admin</option>
    </select>

    <button class="btn btn-login w-100 text-white">
        Login
    </button>
</form>

</div>

<script>


function login(e){
    e.preventDefault();

    const username = document.querySelector('input[type="text"]').value;
    const password = document.querySelector('input[type="password"]').value;

    fetch("http://127.0.0.1:8000/api/token/", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            username: username,
            password: password
        })
    })
    .then(res => res.json())
    .then(data => {
        if(data.access){
            localStorage.setItem("access", data.access);
            window.location = "dashboard.html";
        } else {
            alert("Invalid credentials");
        }
    });
}
</script>


</body>
</html>
