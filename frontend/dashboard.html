<!DOCTYPE html>
<html>
<head>
    <title>AI Exam Monitoring Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body { background: #0f172a; color: white; }

        .camera-box {
            background: #1e293b;
            padding: 10px;
            border-radius: 15px;
            margin-bottom: 15px;
            position: relative;
        }

        .alert-box {
            background: #1e293b;
            padding: 15px;
            border-radius: 15px;
            height: 80vh;
            overflow: auto;
        }

        .red { border: 3px solid red; }

        .alert-item {
            background: #334155;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.2s;
        }

        .alert-item:hover {
            background: #475569;
            transform: scale(1.02);
        }

        .risk {
            position: absolute;
            top: 10px;
            right: 10px;
            padding: 4px 10px;
            border-radius: 15px;
            font-size: 12px;
            color: white;
            font-weight: bold;
        }

        .low { background: green; }
        .medium { background: orange; }
        .high { background: red; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="container-fluid p-3">

    <h2>🎓 Smart Exam Monitoring Dashboard</h2>

    <div class="row mt-3">

        <!-- Camera Grid -->
        <div class="col-md-8">
            <div class="row" id="cameraContainer">
                <!-- Dynamic cameras here -->
            </div>
        </div>

        <!-- Alerts Panel -->
        <div class="col-md-4">
            <div class="alert-box" id="alertContainer">
                <h4>🚨 Live Alerts</h4>
                <hr>
            </div>
        </div>
        <div class="mt-4">
    <h4>📊 Risk Analytics</h4>
    <canvas id="riskChart"></canvas>
</div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
function loadDashboard() {
    fetch("http://127.0.0.1:8000/api/dashboard/", {
        headers: {
            "Authorization": "Bearer " + localStorage.getItem("access")
        }
    })
    .then(res => {
        if(res.status === 401){
            alert("Session expired. Please login again.");
            window.location = "login.html";
        }
        return res.json();
    })
    .then(data => {

        const camContainer = document.getElementById("cameraContainer");
        camContainer.innerHTML = "";

        data.cameras.forEach(cam => {
            let borderClass = cam.risk_level === "High" ? "red" : "";

            camContainer.innerHTML += `
                <div class="col-md-6">
                    <div class="camera-box ${borderClass}">
                        <h6>${cam.hall} - ${cam.camera}</h6>
                        <span class="risk ${cam.risk_level.toLowerCase()}">
                            ${cam.risk_level} Risk
                        </span>
                        <img src="https://picsum.photos/400/200" class="img-fluid">
                        <p>Last: ${cam.last_violation || "Normal"}</p>
                        <p>Score: ${cam.risk_score}</p>
                    </div>
                </div>
            `;
        });

        const alertContainer = document.getElementById("alertContainer");
        alertContainer.innerHTML = "<h4>🚨 Live Alerts</h4><hr>";

        data.alerts.forEach(alert => {
            alertContainer.innerHTML += `
                <div class="alert-item p-2 mb-2">
                    <b>${alert.time}</b> ${alert.student} – ${alert.hall}
                    <span class="badge bg-danger float-end">
                        ${alert.violation}
                    </span>
                </div>
            `;
        });

    });
}
// 🔥 WebSocket Real-Time Connection
const socket = new WebSocket("ws://127.0.0.1:8000/ws/dashboard/");

socket.onmessage = function(e) {
    console.log("Live update received");
    loadDashboard();
};

socket.onopen = function() {
    console.log("WebSocket Connected");
};

socket.onerror = function(error) {
    console.log("WebSocket Error:", error);
};
function loadAnalytics() {
    fetch("http://127.0.0.1:8000/api/analytics/", {
        headers: {
            "Authorization": "Bearer " + localStorage.getItem("access")
        }
    })
    .then(res => {
        if(res.status === 401){
            alert("Session expired. Please login again.");
            window.location = "login.html";
        }
        return res.json();
    })
    .then(data => {

        const ctx = document.getElementById("riskChart");

        new Chart(ctx, {
            type: "bar",
            data: {
                labels: ["High Risk", "Medium Risk", "Low Risk"],
                datasets: [{
                    label: "Risk Distribution",
                    data: [
                        data.high_risk,
                        data.medium_risk,
                        data.low_risk
                    ],
                    backgroundColor: ["red", "orange", "green"]
                }]
            }
        });

    });
}


// Initial load
loadDashboard();
loadAnalytics();
</script>

</body>
</html>
